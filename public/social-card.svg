  <text x="80" y="185" fill="#f4c95d" font-size="58" font-family="Arial, sans-serif" font-weight="700">THE HIDDEN EQUATIONS</text>
  <text x="80" y="275" fill="#ffffff" font-size="92" font-family="Arial, sans-serif" font-weight="900">OF FEELING</text>
  <text x="84" y="350" fill="#c9bfae" font-size="32" font-family="Arial, sans-serif">A symbolic formula atlas for comedy, drama, and humane design.</text>
  <text x="84" y="465" fill="#ffffff" font-size="42" font-family="Arial, sans-serif">Not measurement. Not diagnosis. Design patterns.</text>
